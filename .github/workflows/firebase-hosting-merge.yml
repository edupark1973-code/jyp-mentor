name: Deploy to Firebase Hosting and Functions on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 캐시를 사용해 빌드 속도를 높입니다
      - name: Install Dependencies
        run: npm ci

      # ✅ 핵심: 빌드할 때 시크릿 값을 환경 변수로 주입합니다
      - name: Build
        run: npm run build
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          # 필요한 다른 환경변수가 있다면 여기에 추가하세요

      # ✅ 웹 호스팅과 서버 엔진(Functions)을 모두 배포합니다
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JYP_MENTOR }}
          channelId: live
          projectId: jyp-mentor
        # 👇👇 여기가 추가된 부분입니다! (Next.js 웹 프레임워크 지원 활성화) 👇👇
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks